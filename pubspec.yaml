name: wordsearch_quiz
description: "Word Search Quiz - Play 1,918+ word search puzzles across 25 categories"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.8.1
  google_mobile_ads: ^5.3.0
  shared_preferences: ^2.3.4
  share_plus: ^10.1.4
  confetti: ^0.7.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/puzzles.json
    - assets/data/categories.json
